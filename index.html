<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>:D</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 30px;
      -webkit-user-select: none;
      user-select: none;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.15);
      filter: blur(100px);
      z-index: -1;
      animation: floatGlow 10s infinite alternate ease-in-out;
      will-change: transform;
    }

    .bg-glow:nth-child(1) {
      top: -150px;
      left: -100px;
    }

    .bg-glow:nth-child(2) {
      bottom: -200px;
      right: -100px;
      background: rgba(255, 0, 200, 0.12);
      animation-delay: 2s;
    }

    @keyframes floatGlow {
      from {
        transform: translateY(0px) translateX(0px);
      }
      to {
        transform: translateY(40px) translateX(30px);
      }
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, cyan, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 35px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .wide-card {
      grid-column: span 2;
    }

    .small-card {
      max-width: 100%;
    }

    @media (max-width: 800px) {
      .search-grid {
        grid-template-columns: 1fr;
      }

      .wide-card {
        grid-column: span 1;
      }
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 20px;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: cyan;
    }

    .card h2 {
      margin-bottom: 15px;
      font-size: 1.4rem;
    }

    .search-box {
      display: flex;
      gap: 10px;
      position: relative;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
      transition: 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
      font-size: 16px;
    }

    input:focus {
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 10px cyan;
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, cyan, #7c3aed);
      color: white;
      font-weight: bold;
      transition: 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
      font-size: 16px;
    }

    button:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    button:active {
      transform: scale(0.98);
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .quick-links a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .quick-links a:hover {
      background: rgba(0,255,255,0.25);
    }

    .tools {
      max-width: 1200px;
      margin: 40px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .clock {
      font-size: 2rem;
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      font-family: 'Menlo', 'Courier New', monospace;
      -webkit-font-variant-numeric: tabular-nums;
      font-variant-numeric: tabular-nums;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .light {
      background: linear-gradient(135deg, #dbeafe, #f8fafc);
      color: #111827;
    }

    .light .card {
      background: rgba(255,255,255,0.7);
      color: #111827;
    }

    .light input {
      background: rgba(0,0,0,0.08);
      color: black;
    }

    .light input::placeholder {
      color: rgba(0,0,0,0.5);
    }

    .light textarea {
      background: rgba(0,0,0,0.08) !important;
      color: black !important;
    }

    .light .quick-links a {
      color: black;
      background: rgba(0,0,0,0.06);
    }

    .light button {
      color: white;
    }

    .light button:not(.theme-toggle) {
      background: linear-gradient(135deg, #0891b2, #6d28d9);
    }

    .light h2 {
      color: #111827 !important;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.7;
    }

    textarea {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-appearance: none;
      appearance: none;
      font-size: 16px;
      color: white;
      background: rgba(255,255,255,0.12) !important;
    }

    /* Suggestions dropdown styles */
    .suggestions-dropdown {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 0;
      right: 0;
      background: rgba(20, 20, 30, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .suggestions-dropdown.show {
      display: block;
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.2s ease;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .suggestion-item:first-child {
      border-radius: 12px 12px 0 0;
    }

    .suggestion-item:last-child {
      border-bottom: none;
      border-radius: 0 0 12px 12px;
    }

    .suggestion-item:only-child {
      border-radius: 12px;
    }

    .suggestion-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .suggestion-icon {
      opacity: 0.6;
      font-size: 1rem;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .suggestion-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .light .suggestions-dropdown {
      background: rgba(240, 240, 245, 0.95);
      color: #111827;
    }

    .light .suggestion-item {
      border-bottom-color: rgba(0,0,0,0.1);
    }

    .light .suggestion-item:hover {
      background: rgba(0,0,0,0.1);
    }

    .search-box-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow"></div>

  <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>

  <div style="display:flex; justify-content:center; align-items:center; gap:28px; margin-bottom:10px; flex-wrap:wrap;">
    <a href="https://duckduckgo.com" style="transition:0.2s;">
      <img src="https://upload.wikimedia.org/wikipedia/en/9/90/The_DuckDuckGo_Duck.png" alt="DuckDuckGo" style="height:64px; cursor:pointer; filter:drop-shadow(0 0 10px rgba(227,113,81,0.4));">
    </a>

    <a href="https://google.com" style="transition:0.2s;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="height:52px; cursor:pointer; filter:drop-shadow(0 0 10px rgba(66,133,244,0.4));">
    </a>

    <a href="https://youtube.com" style="transition:0.2s;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube" style="height:52px; cursor:pointer; filter:drop-shadow(0 0 10px rgba(255,0,0,0.4));">
    </a>

    <a href="https://wikipedia.org" style="transition:0.2s;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png" alt="Wikipedia" style="height:56px; cursor:pointer; filter:drop-shadow(0 0 10px rgba(162,169,177,0.4));">
    </a>
  </div>

  <div style="display:flex; justify-content:center; align-items:center; gap:18px; margin-bottom:35px; opacity:0.9; flex-wrap:wrap;">
    <a href="https://chatgpt.com"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="ChatGPT" style="height:26px;"></a>
    <a href="https://github.com"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub" style="height:26px; filter:invert(1);"></a>
    <a href="https://archive.org"><img src="https://archive.org/images/glogo.jpg" alt="Archive.org" style="height:26px; border-radius:6px;"></a>
  </div>

  <div class="search-grid">

    <div class="card wide-card" style="border:1px solid #b85a41; background:rgba(227,113,81,0.08);" onclick="handleCardClick('duck', event)">
      <h2 style="color:#E37151;">DuckDuckGo</h2>
      <div class="search-box-wrapper">
        <div class="search-box">
          <input type="text" id="duckInput" placeholder="Search privately...">
          <button onclick="openEngine('duck')">Go</button>
        </div>
        <div class="suggestions-dropdown" id="duckSuggestions"></div>
      </div>
    </div>

    <div class="card wide-card" style="border:1px solid #2f5fb3; background:rgba(66,133,244,0.08);" onclick="handleCardClick('google', event)">
      <h2 style="color:#4285F4;">Google Search</h2>
      <div class="search-box-wrapper">
        <div class="search-box">
          <input type="text" id="googleInput" placeholder="Search Google...">
          <button onclick="openEngine('google')">Go</button>
        </div>
        <div class="suggestions-dropdown" id="googleSuggestions"></div>
      </div>
    </div>

    <div class="card small-card" style="border:1px solid #b30000; background:rgba(255,0,0,0.08);" onclick="handleCardClick('youtube', event)">
      <h2 style="color:#FF0000;">YouTube</h2>
      <div class="search-box-wrapper">
        <div class="search-box">
          <input type="text" id="youtubeInput" placeholder="Find videos...">
          <button onclick="openEngine('youtube')">Go</button>
        </div>
        <div class="suggestions-dropdown" id="youtubeSuggestions"></div>
      </div>
    </div>

    <div class="card small-card" style="border:1px solid #6f767d; background:rgba(162,169,177,0.08);" onclick="handleCardClick('wiki', event)">
      <h2 style="color:#A2A9B1;">Wikipedia</h2>
      <div class="search-box-wrapper">
        <div class="search-box">
          <input type="text" id="wikiInput" placeholder="Search knowledge...">
          <button onclick="openEngine('wiki')">Go</button>
        </div>
        <div class="suggestions-dropdown" id="wikiSuggestions"></div>
      </div>
    </div>

  </div>

  <div class="tools" style="display:flex; flex-direction:column; align-items:center; gap:25px; max-width:1200px; margin:40px auto 0;">

    <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; width:100%;">

      <div class="card" style="flex:1; min-width:260px; max-width:420px;">
        <h2>Live Clock</h2>
        <div class="clock" id="clock">00:00:00</div>
      </div>

      <div class="card" style="flex:1; min-width:260px; max-width:420px;">
        <h2>Quick Notes</h2>
        <textarea id="notesBox" placeholder="Write something..." style="width:100%; height:120px; border:none; outline:none; resize:none; padding:15px; border-radius:16px;"></textarea>
        <button style="margin-top:15px; width:100%;" onclick="saveNotes()">Save Notes</button>
      </div>

    </div>

    <div class="card" style="width:100%; max-width:420px; border:1px solid #3a3f46; background:rgba(245,245,245,0.05); text-align:center;">
      <h2 style="font-size:2rem; margin-bottom:20px;">GitHub</h2>
      <button style="width:100%; background:#24292f; font-size:1.2rem; padding:20px; color: white;" onclick="window.location.href='https://github.com'">Open GitHub</button>
    </div>

  </div>

  <footer>
    Built with HTML, CSS, and JavaScript
  </footer>

  <script>
    // Debounce function for API calls
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    // Fetch suggestions from DuckDuckGo
    async function fetchDuckDuckGoSuggestions(query) {
      if (!query.trim()) return [];
      try {
        const response = await fetch(`https://duckduckgo.com/ac/?q=${encodeURIComponent(query)}&type=list`);
        const data = await response.json();
        return data[1] || [];
      } catch (e) {
        console.error('Error fetching DuckDuckGo suggestions:', e);
        return [];
      }
    }

    // Fetch suggestions from Google using custom search API
    async function fetchGoogleSuggestions(query) {
      if (!query.trim()) return [];
      try {
        // Use the Google Suggest API which is CORS-enabled
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch(
          `https://www.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}`,
          { signal: controller.signal }
        );
        
        clearTimeout(timeoutId);
        
        if (!response.ok) return [];
        
        const text = await response.text();
        // Parse the response - it returns a JavaScript array wrapped in parentheses
        const jsonMatch = text.match(/\[\[.*?\]\]/);
        if (!jsonMatch) return [];
        
        const data = JSON.parse(jsonMatch[0]);
        return data[0] && Array.isArray(data[0]) ? data[0].slice(0, 8) : [];
      } catch (e) {
        console.error('Error fetching Google suggestions:', e);
        return [];
      }
    }

    // Fetch suggestions from YouTube using API
    async function fetchYouTubeSuggestions(query) {
      if (!query.trim()) return [];
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch(
          `https://www.youtube.com/api/opensearch?search_query=${encodeURIComponent(query)}&callback=console.log`,
          { signal: controller.signal }
        );
        
        clearTimeout(timeoutId);
        
        if (!response.ok) return [];
        
        const text = await response.text();
        // Parse YouTube's response format
        const jsonMatch = text.match(/\[\[.*?\]\]/);
        if (!jsonMatch) return [];
        
        const data = JSON.parse(jsonMatch[0]);
        return data[1] && Array.isArray(data[1]) ? data[1].slice(0, 8) : [];
      } catch (e) {
        console.error('Error fetching YouTube suggestions:', e);
        return [];
      }
    }

    // Fetch Wikipedia suggestions
    async function fetchWikipediaSuggestions(query) {
      if (!query.trim()) return [];
      try {
        const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`);
        const data = await response.json();
        return data.query.search.map(item => item.title);
      } catch (e) {
        console.error('Error fetching Wikipedia suggestions:', e);
        return [];
      }
    }

    // Display suggestions in dropdown
    function displaySuggestions(suggestions, dropdownId, inputId) {
      const dropdown = document.getElementById(dropdownId);
      const input = document.getElementById(inputId);
      
      if (suggestions.length === 0) {
        dropdown.classList.remove('show');
        return;
      }

      dropdown.innerHTML = suggestions.slice(0, 8).map(suggestion => `
        <div class="suggestion-item" onclick="setSuggestion('${inputId}', '${suggestion.replace(/'/g, "\\'")}')">
          <svg class="suggestion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <span class="suggestion-text">${escapeHtml(suggestion)}</span>
        </div>
      `).join('');

      dropdown.classList.add('show');
    }

    // Set suggestion text to input
    function setSuggestion(inputId, suggestion) {
      const input = document.getElementById(inputId);
      input.value = suggestion;
      
      // Close dropdown
      const dropdownId = inputId.replace('Input', 'Suggestions');
      document.getElementById(dropdownId).classList.remove('show');
      
      // Focus on input
      input.focus();
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Create debounced fetch functions
    const duckDuckGoFetch = debounce(async (query) => {
      const suggestions = await fetchDuckDuckGoSuggestions(query);
      displaySuggestions(suggestions, 'duckSuggestions', 'duckInput');
    }, 300);

    const googleFetch = debounce(async (query) => {
      const suggestions = await fetchGoogleSuggestions(query);
      displaySuggestions(suggestions, 'googleSuggestions', 'googleInput');
    }, 300);

    const youtubeFetch = debounce(async (query) => {
      const suggestions = await fetchYouTubeSuggestions(query);
      displaySuggestions(suggestions, 'youtubeSuggestions', 'youtubeInput');
    }, 300);

    const wikipediaFetch = debounce(async (query) => {
      const suggestions = await fetchWikipediaSuggestions(query);
      displaySuggestions(suggestions, 'wikiSuggestions', 'wikiInput');
    }, 300);

    // Add event listeners for input changes
    document.getElementById('duckInput').addEventListener('input', (e) => {
      duckDuckGoFetch(e.target.value);
    });

    document.getElementById('googleInput').addEventListener('input', (e) => {
      googleFetch(e.target.value);
    });

    document.getElementById('youtubeInput').addEventListener('input', (e) => {
      youtubeFetch(e.target.value);
    });

    document.getElementById('wikiInput').addEventListener('input', (e) => {
      wikipediaFetch(e.target.value);
    });

    // Close suggestions on blur
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box-wrapper')) {
        document.querySelectorAll('.suggestions-dropdown').forEach(el => {
          el.classList.remove('show');
        });
      }
    });

    function openEngine(type) {
      const engines = {
        google: 'https://www.google.com',
        duck: 'https://duckduckgo.com',
        youtube: 'https://www.youtube.com',
        wiki: 'https://en.wikipedia.org'
      };

      const inputIds = {
        google: 'googleInput',
        duck: 'duckInput',
        youtube: 'youtubeInput',
        wiki: 'wikiInput'
      };

      const input = document.getElementById(inputIds[type]);
      const query = input ? input.value.trim() : '';

      if (query) {
        let url = '';
        if (type === 'google') url = 'https://www.google.com/search?q=';
        if (type === 'duck') url = 'https://duckduckgo.com/?q=';
        if (type === 'youtube') url = 'https://www.youtube.com/results?search_query=';
        if (type === 'wiki') url = 'https://en.wikipedia.org/wiki/Special:Search?search=';

        window.location.href = url + encodeURIComponent(query);
      } else {
        window.location.href = engines[type];
      }
    }

    function handleCardClick(type, event) {
      const tag = event.target.tagName.toLowerCase();
      if (tag === 'input' || tag === 'button' || tag === 'textarea') return;
      openEngine(type);
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString();
      document.getElementById('clock').textContent = time;
    }

    setInterval(updateClock, 1000);
    updateClock();

    function saveNotes() {
      localStorage.setItem('jasperSearchNotes', document.getElementById('notesBox').value);
      alert('Notes saved!');
    }

    window.addEventListener('load', () => {
      const saved = localStorage.getItem('jasperSearchNotes');
      if(saved) {
        document.getElementById('notesBox').value = saved;
      }
      // Focus on DuckDuckGo search bar on page load
      document.getElementById('duckInput').focus();
    });

    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }

    // Load saved theme preference
    window.addEventListener('load', () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light');
      }
    });

    // Add Enter/Return key support for search inputs
    document.getElementById('duckInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') openEngine('duck');
    });

    document.getElementById('googleInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') openEngine('google');
    });

    document.getElementById('youtubeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') openEngine('youtube');
    });

    document.getElementById('wikiInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') openEngine('wiki');
    });

    // Add Cmd+Enter support for notes textarea (Mac) and Ctrl+Enter (Windows/Linux)
    document.getElementById('notesBox').addEventListener('keypress', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        saveNotes();
      }
    });

    // Handle all link clicks to open in current tab
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a');
      if (link && !e.target.closest('.suggestions-dropdown')) {
        e.preventDefault();
        window.location.href = link.href;
      }
    });
  </script>
</body>
</html>
